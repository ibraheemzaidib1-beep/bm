<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>BM Supermarket POS</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap">
<style>
body{margin:0;font-family:'Cairo',sans-serif;background:linear-gradient(135deg,#251c4a,#0f3f4a);color:#fff;overflow-x:hidden}
.container{max-width:1200px;margin:30px auto;padding:20px;display:flex;gap:20px;flex-wrap:wrap;display:none;opacity:0;transform:translateY(20px);transition:0.5s;}
.container.show{opacity:1;transform:translateY(0);}
.card{background:linear-gradient(135deg,#ffffff,#eef3ff);color:#111;border-radius:26px;box-shadow:0 25px 60px rgba(0,0,0,.25);padding:28px;margin-bottom:22px}
h2{margin-top:0;color:#5b21b6;font-weight:700}
input{width:100%;padding:12px;border-radius:14px;border:1px solid #bbb;margin:8px 0;font-size:15px}
button{border:none;border-radius:18px;padding:14px 22px;margin:4px;font-weight:700;cursor:pointer}
.primary{background:linear-gradient(45deg,#5b21b6,#7c3aed);color:#fff}
.success{background:linear-gradient(45deg,#0d9488,#14b8a6);color:#fff}
.danger{background:linear-gradient(45deg,#dc2626,#ef4444);color:#fff}
.ghost{background:#e5e7eb;color:#111}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{text-align:center;padding:10px;border-bottom:1px solid #ddd;cursor:pointer}
td input{width:60px;padding:4px;text-align:center;border-radius:6px;border:1px solid #ccc}
.total{font-weight:700;margin-top:10px;text-align:right;font-size:20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:0.5s}
.overlay.show{opacity:1;pointer-events:auto;}
.box{background:white;border-radius:24px;padding:36px;width:100%;max-width:420px;color:#111;box-shadow:0 25px 50px rgba(0,0,0,.35)}
.title{text-align:center;color:#5b21b6;font-weight:700;font-size:22px;margin-bottom:15px}
#msgBox{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 24px;border-radius:12px;font-weight:700;opacity:0;transition:opacity 0.5s;z-index:2000;}
#userControls{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:10px;z-index:100;}
</style>
</head>
<body>

<!-- صندوق الرسائل -->
<div id="msgBox"></div>

<!-- أزرار المستخدم -->
<div id="userControls" style="display:none">
  <button class="danger" onclick="deleteUser()">حذف المستخدم</button>
  <button class="ghost" onclick="logoutUser()">تسجيل الخروج</button>
</div>

<!-- تسجيل الدخول -->
<div id="loginScreen" class="overlay show">
  <div class="box">
    <div class="title">تسجيل الدخول</div>
    <input id="loginUser" type="text" placeholder="اسم المستخدم">
    <input id="loginPass" type="password" placeholder="كلمة المرور">
    <button class="primary" onclick="checkLogin()">تسجيل الدخول</button>
    <button class="ghost" onclick="showCreateUserScreen()">إنشاء مستخدم جديد</button>
  </div>
</div>

<!-- إنشاء مستخدم -->
<div id="createUserScreen" class="overlay">
  <div class="box">
    <div class="title">إنشاء مستخدم جديد</div>
    <input id="newUsername" type="text" placeholder="اسم المستخدم">
    <input id="newUserPass" type="password" placeholder="كلمة المرور">
    <button class="primary" onclick="createUser()">حفظ المستخدم</button>
    <button class="ghost" onclick="showLoginScreen()">رجوع لتسجيل الدخول</button>
  </div>
</div>

<!-- المحتوى الرئيسي -->
<div class="container">
  <!-- العمود الأيسر -->
  <div style="flex:1;min-width:300px">
    <div class="card">
      <h2>إضافة / تعديل منتج</h2>
      <input id="barcode" placeholder="باركود">
      <input id="name" placeholder="اسم المنتج">
      <input id="price" type="number" placeholder="السعر">
      <button class="primary" onclick="addOrEditProduct()">إضافة / تعديل</button>
      <button class="danger" onclick="removeProductByBarcode()">إزالة المنتج</button>
    </div>

    <div class="card" style="margin-top:20px">
      <h2>البحث عن المنتجات</h2>
      <input id="searchCode" placeholder="أدخل الباركود واضغط Enter">
      <button class="primary" onclick="searchEvent()">بحث</button>
    </div>
  </div>

  <!-- العمود الأيمن -->
  <div style="flex:2;min-width:500px">
    <div class="card">
      <h2>المنتجات المضافة</h2>
      <table>
        <thead>
          <tr>
            <th>الباركود</th><th>الاسم</th><th>الكمية</th><th>السعر (د.ع)</th><th>إجراءات</th>
          </tr>
        </thead>
        <tbody id="searchList"></tbody>
      </table>

      <div class="total" style="font-size:24px;margin-top:12px">الإجمالي: <span id="totalPrice">0</span> د.ع</div>
      <div class="total" style="font-size:22px;margin-top:8px">
        المبلغ الذي أعطاه العميل: <input id="givenAmount" type="number" placeholder="أدخل المبلغ" oninput="calculateReturn()">
      </div>
      <div class="total" style="font-size:22px;margin-top:8px">المبلغ المراد إرجاعه: <span id="returnAmount">0</span> د.ع</div>

      <button class="success" onclick="saveInvoice()" style="font-size:16px;padding:14px 22px;margin-top:12px">طباعة الفاتورة</button>
      <button class="danger" onclick="clearAllDataWithPass()" style="font-size:16px;padding:14px 22px;margin-top:12px">مسح جميع البيانات</button>
    </div>
  </div>
</div>

<script>
function showMsg(text,color="#333"){
  const box=document.getElementById("msgBox");
  box.textContent=text; box.style.background=color; box.style.opacity="1";
  setTimeout(()=>{box.style.opacity="0"},3000);
}

function showLoginScreen(){document.getElementById("loginScreen").classList.add("show"); document.getElementById("createUserScreen").classList.remove("show");}
function showCreateUserScreen(){document.getElementById("loginScreen").classList.remove("show"); document.getElementById("createUserScreen").classList.add("show");}

let users = JSON.parse(localStorage.getItem("users")||'[]');
if(users.length===0){users=[{username:"admin",password:"zmn2020zmn"}]; localStorage.setItem("users",JSON.stringify(users));}
let currentUser="", products=[], foundProducts=[];

function loadUserData(){products=JSON.parse(localStorage.getItem("products_"+currentUser)||"[]"); foundProducts=[];}
function saveUserData(){localStorage.setItem("products_"+currentUser,JSON.stringify(products));}

// تسجيل الدخول
function checkLogin(){
  const username=document.getElementById("loginUser").value.trim();
  const pass=document.getElementById("loginPass").value.trim();
  const u=users.find(u=>u.username===username && u.password===pass);
  if(u){
    currentUser=username;
    document.getElementById("loginScreen").classList.remove("show");

    // إظهار الواجهة بشكل صحيح
    const container = document.querySelector(".container");
    container.style.display="flex";       // عرض الواجهة
    setTimeout(()=>{container.classList.add("show");},50); // تشغيل الأنيميشن
    document.getElementById("userControls").style.display="flex"; // أزرار المستخدم
    loadUserData(); updateTotals(); showMsg(`تم تسجيل الدخول: ${username}`,"#16a34a");
  }else showMsg("اسم المستخدم أو كلمة المرور خاطئ","#dc2626");
}

// إنشاء مستخدم
function createUser(){
  const username=document.getElementById("newUsername").value.trim();
  const password=document.getElementById("newUserPass").value.trim();
  if(!username || !password){showMsg("اكمل البيانات","#dc2626"); return;}
  if(users.some(u=>u.username===username)){showMsg("اسم المستخدم موجود","#dc2626"); return;}
  users.push({username,password}); localStorage.setItem("users",JSON.stringify(users));
  showMsg(`تم إنشاء المستخدم: ${username}`,"#16a34a");
  document.getElementById("newUsername").value=""; document.getElementById("newUserPass").value="";
  showLoginScreen();
}

// تسجيل الخروج
function logoutUser(){
  currentUser=""; products=[]; foundProducts=[];
  const container=document.querySelector(".container");
  container.classList.remove("show");
  setTimeout(()=>{container.style.display="none";},500);
  document.getElementById("userControls").style.display="none";
  showLoginScreen(); showMsg("تم تسجيل الخروج","#16a34a");
}

// حذف المستخدم
function deleteUser(){
  if(!currentUser) return;
  if(confirm(`هل تريد حذف المستخدم: ${currentUser}? سيتم حذف جميع بياناته!`)){
    users=users.filter(u=>u.username!==currentUser);
    localStorage.setItem("users",JSON.stringify(users));
    localStorage.removeItem("products_"+currentUser);
    logoutUser();
    showMsg("تم حذف المستخدم","#dc2626");
  }
}

// العملات العراقية
function formatIQD(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,",");}

// إضافة/تعديل المنتج بالباركود
function addOrEditProduct(){
  let b=document.getElementById("barcode").value.trim();
  if(!b){showMsg("أدخل الباركود","#dc2626"); return;}
  let n=document.getElementById("name").value.trim();
  let p=parseInt(document.getElementById("price").value);
  const i=products.findIndex(x=>x.barcode===b);
  if(i>-1){
    if(n) products[i].name=n;
    if(!isNaN(p)) products[i].price=p;
    showMsg("تم تعديل المنتج","#16a34a");
  }else{
    if(!n||isNaN(p)){showMsg("أدخل اسم وسعر المنتج","#dc2626"); return;}
    products.push({barcode:b,name:n,price:p});
    showMsg("تم إضافة المنتج","#16a34a");
  }
  saveUserData(); document.getElementById("barcode").value=document.getElementById("name").value=document.getElementById("price").value="";
  updateTotals();
}

// إزالة المنتج بالباركود
function removeProductByBarcode(){
  let b=document.getElementById("barcode").value.trim();
  const i=products.findIndex(x=>x.barcode===b);
  if(i>-1){products.splice(i,1); saveUserData(); showMsg("تم إزالة المنتج","#dc2626"); updateTotals();}
  else showMsg("الباركود غير موجود","#dc2626");
}

// البحث وإضافة للفاتورة
const searchEl=document.getElementById("searchCode");
const searchList=document.getElementById("searchList");
const totalPrice=document.getElementById("totalPrice");

searchEl.addEventListener("keypress",e=>{if(e.key==="Enter") searchEvent();});
function searchEvent(){
  const c=searchEl.value.trim(); if(!c) return;
  const prod=products.find(p=>p.barcode===c);
  if(prod){
    let ex=foundProducts.find(p=>p.barcode===c);
    if(ex) ex.quantity++; else foundProducts.push({...prod,quantity:1});
    searchEl.value=""; updateTotals(); showMsg("تم إضافة المنتج","#16a34a");
  }else showMsg("غير مسجل","#dc2626");
}

function updateTotals(){
  searchList.innerHTML=""; let total=0;
  foundProducts.forEach((p,i)=>{
    const sum=p.quantity*p.price; total+=sum;
    searchList.innerHTML+=`<tr onclick="editProduct(${i})">
      <td>${p.barcode}</td><td>${p.name}</td>
      <td><input type="number" min="1" value="${p.quantity}" onchange="changeQty(${i},this.value)"></td>
      <td>${formatIQD(sum)}</td>
      <td><button class="danger" onclick="removeItem(${i})">X</button></td>
    </tr>`;
  });
  totalPrice.textContent=formatIQD(total); calculateReturn();
}

function changeQty(i,v){v=parseInt(v)||1;foundProducts[i].quantity=v;updateTotals();}
function removeItem(i){foundProducts.splice(i,1);updateTotals(); showMsg("تم إزالة المنتج من الفاتورة","#dc2626");}

// تعديل المنتج مباشرة من الفاتورة
function editProduct(i){
  const p=foundProducts[i];
  const newQty=parseInt(prompt("أدخل الكمية الجديدة:", p.quantity));
  if(!isNaN(newQty) && newQty>0){p.quantity=newQty; updateTotals(); showMsg("تم تعديل الكمية","#16a34a");}
}

function saveInvoice(){
  if(foundProducts.length===0){showMsg("لا توجد منتجات","#dc2626"); return;}
  let t=`فاتورة\n\n`;
  foundProducts.forEach(p=>t+=`${p.name} | ${p.quantity} | ${formatIQD(p.price*p.quantity)} د.ع\n`);
  t+=`\nالإجمالي: ${totalPrice.textContent} د.ع\nالمبلغ الذي أعطاه العميل: ${document.getElementById("givenAmount").value || 0} د.ع\nالمبلغ المراد إرجاعه: ${document.getElementById("returnAmount").textContent} د.ع`;
  const w=window.open(""); w.document.write(`<pre>${t}</pre>`); w.print(); w.close();
  foundProducts=[]; updateTotals();
  document.getElementById("givenAmount").value=""; document.getElementById("returnAmount").textContent="0";
  showMsg("تم طباعة الفاتورة","#16a34a");
}

function calculateReturn(){
  const total=parseFloat(totalPrice.textContent.replace(/,/g,''))||0;
  const given=parseFloat(document.getElementById("givenAmount").value)||0;
  const ret=given-total;
  document.getElementById("returnAmount").textContent=ret>0?formatIQD(ret):0;
}

function clearAllDataWithPass(){
  const p=prompt("أدخل كلمة المرور لمسح جميع البيانات:");
  const u=users.find(u=>u.username===currentUser && u.password===p);
  if(u){products=[]; foundProducts=[]; saveUserData(); updateTotals(); document.getElementById("givenAmount").value=""; document.getElementById("returnAmount").textContent="0"; showMsg("تم مسح جميع البيانات","#16a34a");}
  else showMsg("كلمة المرور خاطئة","#dc2626");
}
</script>
</body>
</html>
